<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta "viewport" content="width=device-width, initial-scale=1.0">
    <title>Сапарлаш — Шаараралык Попутка жана Такси</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Rubik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Leaflet Картасынын куралдары -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Rubik', sans-serif; }
        #map { height: 380px; width: 100%; border-radius: 16px; z-index: 1; border: 2px solid #e2e8f0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- НАВИГАЦИЯ (HEADER) -->
    <header class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🚗</span>
                <div>
                    <h1 class="text-2xl font-bold tracking-wide">Сапарлаш</h1>
                    <p class="text-xs text-blue-200">Ишенимдүү шаараралык жолдош</p>
                </div>
            </div>
            
            <div class="flex items-center flex-wrap gap-3">
                <div class="flex bg-blue-700 p-1 rounded-xl">
                    <button id="btn-passenger-tab" onclick="switchTab('passenger')" class="px-4 py-2 rounded-lg text-sm font-semibold bg-white text-blue-600 shadow transition-all">
                        👨‍✈️ Жүргүнчүлөр
                    </button>
                    <!-- БУЛ ЖЕРДЕГИ СЫНГАН ИКОНКА ОҢДОЛДУ -->
                    <button id="btn-driver-tab" onclick="switchTab('driver')" class="px-4 py-2 rounded-lg text-sm font-semibold text-white hover:bg-blue-600 flex items-center transition-all">
                        <i class="fa-solid fa-plus-circle mr-1.5"></i> Жарыя кошуу
                    </button>
                </div>
                <div id="auth-status" class="flex items-center gap-2 bg-blue-800 px-4 py-2 rounded-xl text-sm"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <!-- ================= ЖҮРГҮНЧҮЛӨР БӨЛҮМҮ ================= -->
        <section id="passenger-section" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold mb-4 text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-magnifying-glass text-blue-500"></i> Сапар издөө
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Каттам түрү</label>
                            <select id="filter-type" onchange="renderAds()" class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50">
                                <option value="all">Баардык таксилер</option>
                                <option value="professional">⭐ Профессионал такси</option>
                                <option value="casual">🚗 Жөнөкөй Попутка</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кайдан</label>
                            <div class="relative">
                                <i class="fa-solid fa-location-dot absolute left-3 top-3.5 text-slate-400"></i>
                                <input type="text" id="search-from" oninput="searchTrips()" placeholder="Мисалы: Кара-Көл" class="w-full border border-slate-200 pl-9 pr-4 py-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кайда</label>
                            <div class="relative">
                                <i class="fa-solid fa-flag-checkered absolute left-3 top-3.5 text-slate-400"></i>
                                <input type="text" id="search-to" oninput="searchTrips()" placeholder="Мисалы: Бишкек" class="w-full border border-slate-200 pl-9 pr-4 py-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-sm font-bold text-slate-900 mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-map-location-dot text-blue-500"></i> Активдүү багыттар картасы
                    </h3>
                    <div id="map"></div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-slate-900">Жаңы сунушталган каттамдар</h2>
                    <span id="ads-count" class="text-xs bg-slate-200 text-slate-700 font-bold px-2.5 py-1 rounded-full">0 жарыя</span>
                </div>
                <div id="ads-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </section>

        <!-- ================= АЙДООЧУЛАР БӨЛҮМҮ ================= -->
        <section id="driver-section" class="hidden max-w-2xl mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-100">
                <div class="flex items-center gap-3 border-b pb-4 mb-6">
                    <span class="text-3xl">🚖</span>
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900">Каттам тууралуу жарыялоо</h2>
                        <p id="driver-profile-notice" class="text-sm text-blue-600 font-medium"></p>
                    </div>
                </div>
                
                <form id="taxi-form" onsubmit="saveForm(event)" class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кайдан (Баштапкы дарек)</label>
                            <input type="text" id="trip-from" placeholder="Мисалы: Кара-Көл" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кайда (Акыркы дарек)</label>
                            <input type="text" id="trip-to" placeholder="Мисалы: Бишкек" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Машинанын маркасы</label>
                            <input type="text" id="car-brand" placeholder="Toyota Camry" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Мамлекеттик номери</label>
                            <input type="text" id="car-number" placeholder="01KG777AAZ" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition uppercase">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Чыга турган күнү жана сааты</label>
                            <input type="datetime-local" id="trip-time" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Бош орун саны</label>
                            <input type="number" id="car-seats" min="1" max="20" placeholder="4" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Жол киреси (Бир орунга сом)</label>
                        <input type="number" id="trip-price" placeholder="1200" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кошумча маалымат (Описание)</label>
                        <textarea id="trip-description" rows="3" placeholder="Кондиционер бар, жүк көп болсо чалыңыз..." class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm"></textarea>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-dashed border-slate-300">
                        <label class="block text-sm font-bold text-slate-700 mb-1">📸 Машинанын сүрөтү</label>
                        <div class="flex flex-wrap items-center gap-3">
                            <label class="bg-blue-50 text-blue-600 border border-blue-200 px-4 py-2 rounded-xl font-medium cursor-pointer text-sm">
                                Файл тандаңыз <input type="file" id="car-photo-file" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'car')">
                            </label>
                            <button type="button" onclick="openCameraModal('car')" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm"><i class="fa-solid fa-camera"></i> Тартуу</button>
                            <div id="car-preview" class="hidden text-xs text-green-600 font-bold">✓ Жүктөлдү</div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition shadow-lg">Жарыялоо 🚀</button>
                </form>
            </div>
        </section>
    </main>

    <!-- КАМЕРА МОДАЛДЫК ТЕРЕЗЕСИ -->
    <div id="camera-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-5 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="font-bold text-slate-900">📸 Камера аркылуу тартуу</h3>
                <button onclick="closeCameraModal()" class="text-slate-400 text-xl">✕</button>
            </div>
            <video id="camera-video" autoplay playsinline class="w-full h-64 bg-black object-cover rounded-xl"></video>
            <div class="flex gap-3">
                <button onclick="closeCameraModal()" class="flex-1 bg-slate-100 py-2 rounded-xl">Жабуу</button>
                <button onclick="takeSnapshot()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl font-bold">Тартуу 📸</button>
            </div>
            <canvas id="camera-canvas" class="hidden"></canvas>
        </div>
    </div>

    <!-- КАТТАЛУУ ЖАНА КИРҮҮ МОДАЛДЫК ТЕРЕЗЕСИ (ТАБДАР ОҢДОЛДУ) -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl max-w-md w-full overflow-hidden shadow-2xl my-8">
            <!-- БУЛ ЖЕРДЕГИ ТАБ КЛАССТАРЫ ЖАНА ID ОҢДОЛДУ -->
            <div class="flex border-b">
                <button onclick="switchAuthTab('login')" id="btn-auth-login-tab" class="flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all duration-200">Кирүү</button>
                <button onclick="switchAuthTab('register')" id="btn-auth-reg-tab" class="flex-1 py-4 text-center font-bold text-sm text-slate-500 border-b-2 border-transparent transition-all duration-200">Катталуу</button>
            </div>

            <!-- КИРҮҮ ФОРМАСЫ -->
            <div id="auth-login-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Телефон номер</label>
                    <input type="tel" id="login-phone" placeholder="+996700112233" class="w-full border border-slate-200 p-3 rounded-xl text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Сыр сөз</label>
                    <input type="password" id="login-password" placeholder="******" class="w-full border border-slate-200 p-3 rounded-xl text-sm">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">Кирүү 🔑</button>
                <button onclick="closeAuthModal()" class="w-full bg-slate-100 text-slate-700 py-2 rounded-xl text-sm">Жабуу</button>
            </div>

            <!-- КАТТАЛУУ ФОРМАСЫ -->
            <div id="auth-register-form" class="hidden p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Ролуңузду тандаңыз</label>
                    <select id="reg-role" onchange="toggleRoleFields()" class="w-full border border-slate-200 p-3 rounded-xl font-bold text-sm bg-slate-50">
                        <option value="passenger">👨‍✈️ Мен Жүргүнчүмүн (Кардар)</option>
                        <option value="casual_driver">🚗 Мен Жөнөкөй Айдоочумун (Попутка)</option>
                        <option value="professional_driver">⭐ Мен Профессионал Айдоочумун (Такси)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Толук атыңыз</label>
                    <input type="text" id="reg-name" placeholder="Аты-жөнүңүз" class="w-full border border-slate-200 p-3 rounded-xl text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Телефон номер</label>
                    <input type="tel" id="reg-phone" placeholder="+996700112233" class="w-full border border-slate-200 p-3 rounded-xl text-sm">
                </div>

                <div id="div-reg-age" class="hidden">
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Жашыңыз</label>
                    <input type="number" id="reg-age" placeholder="Мисалы: 28" class="w-full border border-slate-200 p-3 rounded-xl text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Сыр сөз (Пароль)</label>
                    <input type="password" id="reg-password" placeholder="Пароль түзүңүз" class="w-full border border-slate-200 p-3 rounded-xl text-sm">
                </div>

                <div id="div-reg-docs" class="hidden space-y-3 bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <p class="text-xs font-bold text-slate-700">📄 Документтерди тастыктоо:</p>
                    
                    <div class="space-y-1">
                        <label class="block text-[11px] font-medium text-slate-600">Айдоочулук күбөлүк (Права)</label>
                        <div class="flex items-center gap-2">
                            <label class="bg-white border px-3 py-1.5 rounded-lg text-xs cursor-pointer">Файл... <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'license')"></label>
                            <button type="button" onclick="openCameraModal('license')" class="bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs">Камера</button>
                            <span id="preview-license" class="text-xs text-red-500">Жүктөлгөн жок</span>
                        </div>
                    </div>

                    <div id="div-reg-license-prof" class="space-y-1 hidden">
                        <label class="block text-[11px] font-medium text-slate-600">Такси ишмердүүлүк Лицензиясы</label>
                        <div class="flex items-center gap-2">
                            <label class="bg-white border px-3 py-1.5 rounded-lg text-xs cursor-pointer">Файл... <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'patent')"></label>
                            <button type="button" onclick="openCameraModal('patent')" class="bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs">Камера</button>
                            <span id="preview-patent" class="text-xs text-red-500">Жүктөлгөн жок</span>
                        </div>
                    </div>
                </div>

                <button onclick="handleRegister()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-sm shadow-md">Катталууну аяктоо ✨</button>
                <button onclick="closeAuthModal()" class="w-full bg-slate-100 text-slate-700 py-2 rounded-xl text-sm">Жабуу</button>
            </div>
        </div>
    </div>

    <script>
        const defaultAds = [
            { id: 101, name: "Азамат", phone: "+996700112233", brand: "Toyota Camry", number: "01KG777AAZ", from: "Кара-Көл", to: "Бишкек", time: "2026-06-15T08:30", price: "1200", seats: "4", description: "Багаж бар, кондиционер иштейт.", type: "professional", driverAge: "34", hasLicense: true, photo: "" }
        ];

        let ads = JSON.parse(localStorage.getItem('sapardash_ads')) || defaultAds;
        let users = JSON.parse(localStorage.getItem('sapardash_users')) || [];
        let currentUser = JSON.parse(localStorage.getItem('sapardash_current_user')) || null;
        
        let map;
        let tempImages = { car: "", license: "", patent: "" };
        let activeCameraTarget = ""; 
        let videoStream = null;

        function initMap() {
            map = L.map('map').setView([41.2044, 74.7661], 6); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function switchTab(tab) {
            const passengerSec = document.getElementById('passenger-section');
            const driverSec = document.getElementById('driver-section');
            const btnPass = document.getElementById('btn-passenger-tab');
            const btnDrive = document.getElementById('btn-driver-tab');

            if (tab === 'passenger') {
                passengerSec.classList.remove('hidden'); driverSec.classList.add('hidden');
                btnPass.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-white text-blue-600 shadow transition-all";
                btnDrive.className = "px-4 py-2 rounded-lg text-sm font-semibold text-white hover:bg-blue-600 transition-all";
            } else {
                if (!currentUser || currentUser.role === 'passenger') {
                    alert("Жарыя кошуу үчүн Айдоочу болуп катталышыңыз керек!");
                    openAuthModal('register');
                    return;
                }
                passengerSec.classList.add('hidden'); driverSec.remove('hidden');
                driverSec.classList.remove('hidden');
                btnDrive.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-white text-blue-600 shadow transition-all";
                btnPass.className = "px-4 py-2 rounded-lg text-sm font-semibold text-white hover:bg-blue-600 transition-all";
                document.getElementById('driver-profile-notice').textContent = `Профиль: ${currentUser.name} (${currentUser.role === 'professional_driver' ? 'Проф Такси' : 'Жөнөкөй айдоочу'}, Жашы: ${currentUser.age || 'Жазылган эмес'})`;
            }
        }

        // БУЛ ФУНКЦИЯДАГЫ ТАБ АЛМАШТЫРУУ ЛОГИКАСЫ ТОЛУГУ МЕНЕН ОҢДОЛДУ
        function switchAuthTab(mode) {
            const loginForm = document.getElementById('auth-login-form');
            const regForm = document.getElementById('auth-register-form');
            const loginTab = document.getElementById('btn-auth-login-tab');
            const regTab = document.getElementById('btn-auth-reg-tab');

            if (mode === 'login') {
                loginForm.classList.remove('hidden');
                regForm.classList.add('hidden');
                
                // Кирүү табды активдештирүү
                loginTab.className = "flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all duration-200";
                regTab.className = "flex-1 py-4 text-center font-bold text-sm text-slate-500 border-b-2 border-transparent transition-all duration-200";
            } else {
                loginForm.classList.add('hidden');
                regForm.classList.remove('hidden');
                
                // Катталуу табды активдештирүү (Сүрөттөгү ката ушул жерден оңдолду)
                regTab.className = "flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all duration-200";
                loginTab.className = "flex-1 py-4 text-center font-bold text-sm text-slate-500 border-b-2 border-transparent transition-all duration-200";
            }
        }

        function toggleRoleFields() {
            const role = document.getElementById('reg-role').value;
            const divAge = document.getElementById('div-reg-age');
            const divDocs = document.getElementById('div-reg-docs');
            const divProfDoc = document.getElementById('div-reg-license-prof');

            if (role === 'passenger') {
                divAge.classList.add('hidden'); divDocs.classList.add('hidden');
            } else if (role === 'casual_driver') {
                divAge.classList.remove('hidden'); divDocs.classList.remove('hidden'); divProfDoc.classList.add('hidden');
            } else if (role === 'professional_driver') {
                divAge.classList.remove('hidden'); divDocs.classList.remove('hidden'); divProfDoc.classList.remove('hidden');
            }
        }

        function handleImageUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                tempImages[type] = e.target.result;
                updateImageStatusUI(type);
            };
            reader.readAsDataURL(file);
        }

        function openCameraModal(type) {
            activeCameraTarget = type;
            document.getElementById('camera-modal').classList.remove('hidden');
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => { videoStream = stream; document.getElementById('camera-video').srcObject = stream; })
                .catch(() => { alert("Камера ачылган жок!"); closeCameraModal(); });
        }

        function closeCameraModal() {
            document.getElementById('camera-modal').classList.add('hidden');
            if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
        }

        function takeSnapshot() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('camera-canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            tempImages[activeCameraTarget] = canvas.toDataURL('image/jpeg');
            updateImageStatusUI(activeCameraTarget);
            closeCameraModal();
        }

        function updateImageStatusUI(type) {
            if (type === 'car') document.getElementById('car-preview').classList.remove('hidden');
            if (type === 'license') { document.getElementById('preview-license').textContent = "✓ Жүктөлдү"; document.getElementById('preview-license').className = "text-xs text-green-600 font-bold"; }
            if (type === 'patent') { document.getElementById('preview-patent').textContent = "✓ Жүктөлдү"; document.getElementById('preview-patent').className = "text-xs text-green-600 font-bold"; }
        }

        function handleRegister() {
            const role = document.getElementById('reg-role').value;
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const age = document.getElementById('reg-age').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!name || !phone || !password) { alert("Негизги маалыматтарды толтуруңуз!"); return; }
            if (role !== 'passenger' && !age) { alert("Сураныч, жашыңызды жазыңыз!"); return; }
            if (role !== 'passenger' && !tempImages['license']) { alert("Айдоочулук күбөлүктү (Права) жүктөө керек!"); return; }
            if (role === 'professional_driver' && !tempImages['patent']) { alert("Лицензияны жүктөө шарт!"); return; }

            const user = { role, name, phone, age, password, licenseImg: tempImages['license'], patentImg: tempImages['patent'] };
            users.push(user);
            localStorage.setItem('sapardash_users', JSON.stringify(users));
            currentUser = user;
            localStorage.setItem('sapardash_current_user', JSON.stringify(currentUser));

            alert("Катталуу ийгиликтүү аяктады!");
            closeAuthModal(); updateAuthUI();
        }

        function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const password = document.getElementById('login-password').value.trim();
            
            const user = users.find(u => u.phone === phone && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('sapardash_current_user', JSON.stringify(currentUser));
                alert("Кош келиңиз!"); closeAuthModal(); updateAuthUI();
            } else {
                alert("Логин же пароль туура эмес!");
            }
        }

        function handleLogout() {
            currentUser = null; localStorage.removeItem('sapardash_current_user');
            updateAuthUI(); switchTab('passenger');
        }

        function updateAuthUI() {
            const container = document.getElementById('auth-status');
            if (currentUser) {
                let roleTxt = "Кардар";
                if (currentUser.role === 'casual_driver') roleTxt = "Жөнөкөй Айдоочу";
                if (currentUser.role === 'professional_driver') roleTxt = "Проф Айдоочу";
                container.innerHTML = `<span class="font-bold text-blue-200">👋 ${currentUser.name} (${roleTxt})</span><button onclick="handleLogout()" class="bg-red-500 px-2 py-1 rounded text-xs ml-2">Чыгуу</button>`;
            } else {
                container.innerHTML = `<button onclick="openAuthModal('login')" class="bg-blue-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700 transition">Кирүү / Катталуу</button>`;
            }
        }

        function openAuthModal(mode) { document.getElementById('auth-modal').classList.remove('hidden'); switchAuthTab(mode); toggleRoleFields(); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        function saveForm(event) {
            event.preventDefault();
            const type = currentUser.role === 'professional_driver' ? 'professional' : 'casual';
            
            const newAd = {
                id: Date.now(),
                name: currentUser.name,
                phone: currentUser.phone,
                driverAge: currentUser.age,
                hasLicense: !!currentUser.licenseImg,
                brand: document.getElementById('car-brand').value,
                number: document.getElementById('car-number').value.toUpperCase(),
                from: document.getElementById('trip-from').value,
                to: document.getElementById('trip-to').value,
                time: document.getElementById('trip-time').value,
                price: document.getElementById('trip-price').value,
                seats: document.getElementById('car-seats').value,
                description: document.getElementById('trip-description').value,
                type: type,
                photo: tempImages['car']
            };

            ads.unshift(newAd);
            localStorage.setItem('sapardash_ads', JSON.stringify(ads));
            document.getElementById('taxi-form').reset();
            tempImages['car'] = "";
            document.getElementById('car-preview').classList.add('hidden');
            alert("Жарыя жайгаштырылды!"); switchTab('passenger'); renderAds();
        }

        function searchTrips() {
            const fromVal = document.getElementById('search-from').value.toLowerCase().trim();
            const toVal = document.getElementById('search-to').value.toLowerCase().trim();
            const typeVal = document.getElementById('filter-type').value;

            const filtered = ads.filter(ad => {
                const matchFrom = ad.from.toLowerCase().includes(fromVal);
                const matchTo = ad.to.toLowerCase().includes(toVal);
                const matchType = typeVal === 'all' || ad.type === typeVal;
                return matchFrom && matchTo && matchType;
            });
            renderAds(filtered);
        }

        function renderAds(filteredAds = ads) {
            const container = document.getElementById('ads-container');
            container.innerHTML = '';
            document.getElementById('ads-count').textContent = `${filteredAds.length} жарыя`;

            if (filteredAds.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-8 text-slate-400">Мындай каттам табылган жок 😕</div>`;
                return;
            }

            filteredAds.forEach(ad => {
                const isProf = ad.type === 'professional';
                container.innerHTML += `
                    <div class="bg-white border rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition">
                        <div class="relative h-44 bg-slate-100">
                            <img src="${ad.photo || 'https://images.unsplash.com/photo-1549399542-7e3f8b79c341?w=500'}" class="w-full h-full object-cover">
                            <span class="absolute top-2 left-2 text-[10px] font-bold px-2 py-1 rounded bg-white border shadow-sm">
                                ${isProf ? '⭐ Профессионал Такси' : '🚗 Жөнөкөй Попутка'}
                            </span>
                        </div>
                        <div class="p-5 space-y-3">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold text-slate-900">${ad.from} ➔ ${ad.to}</h3>
                                <span class="font-black text-blue-600 text-lg">${ad.price} сом</span>
                            </div>
                            
                            <div class="text-xs bg-blue-50/50 p-3 rounded-xl border border-blue-100 space-y-1">
                                <p class="font-bold text-slate-700">👤 Айдоочу: ${ad.name} ${ad.driverAge ? `(${ad.driverAge} жашта)` : ''}</p>
                                <p class="text-[11px] text-slate-500">
                                    📜 Документтер: <span class="text-green-600 font-bold">✓ Күбөлүк бар</span> 
                                    ${isProf ? ' | <span class="text-amber-600 font-bold">⭐ Лицензиялуу</span>' : ''}
                                </p>
                            </div>

                            ${ad.description ? `<p class="text-xs italic text-slate-600">"${ad.description}"</p>` : ''}
                            <p class="text-xs text-slate-500 flex justify-between">
                                <span>🪑 Бош орун: <span class="font-bold text-slate-800">${ad.seats}</span></span> 
                                <span>🚘 ${ad.brand} [${ad.number}]</span>
                            </p>
                            <a href="tel:${ad.phone}" class="w-full text-center bg-blue-600 hover:bg-blue-700 text-white block py-2.5 rounded-xl font-bold text-sm transition shadow">📞 Чалуу: ${ad.phone}</a>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = function() { initMap(); updateAuthUI(); renderAds(); };
    </script>
</body>
</html>
