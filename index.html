<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сапарлаш — Шаараралык Попутка жана Такси</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: 'Rubik', sans-serif;
            overflow-x: hidden;
        }
        #map { 
            height: 380px; 
            width: 100%; 
            border-radius: 16px; 
            z-index: 1; 
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        /* ЖАКШЫРТЫЛГАН CSS АНИМАЦИЯЛАРЫ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulseSoft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .animate-pulse-soft {
            animation: pulseSoft 2.5s infinite ease-in-out;
        }
        .modal-bounce {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg sticky top-0 z-50 transition-all duration-300">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 cursor-pointer transform hover:scale-105 transition duration-300">
                <span class="text-3xl animate-pulse-soft">🚗</span>
                <div>
                    <h1 class="text-2xl font-bold tracking-wide bg-clip-text bg-gradient-to-r from-white to-blue-100">Сапардаш</h1>
                    <p class="text-xs text-blue-200">Ишенимдүү шаараралык жолдош</p>
                </div>
            </div>
            
            <div class="flex items-center flex-wrap gap-3">
                <div class="flex bg-blue-900/30 p-1 rounded-xl backdrop-blur-sm border border-white/10">
                    <button id="btn-passenger-tab" onclick="switchTab('passenger')" class="px-4 py-2 rounded-lg text-sm font-semibold bg-white text-blue-600 shadow transition-all duration-300 transform active:scale-95">
                        👨‍✈️ Жүргүнчүлөр
                    </button>
                    <button id="btn-driver-tab" onclick="switchTab('driver')" class="px-4 py-2 rounded-lg text-sm font-semibold text-white hover:bg-white/10 flex items-center transition-all duration-300 transform active:scale-95">
                        <i class="fa-solid fa-plus-circle mr-1.5 text-blue-300"></i> Жарыя кошуу
                    </button>
                </div>
                <div id="auth-status" class="flex items-center gap-2 bg-blue-800/80 backdrop-blur-sm px-4 py-2 rounded-xl text-sm border border-white/10 transition-all duration-300"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <section id="passenger-section" class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade-in">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 transform hover:shadow-md transition duration-300">
                    <h2 class="text-lg font-bold mb-4 text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-magnifying-glass text-blue-500 animate-pulse-soft"></i> Сапар издөө
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Каттам түрү</label>
                            <select id="filter-type" onchange="renderAds()" class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 cursor-pointer">
                                <option value="all">Баардык таксилер</option>
                                <option value="professional">⭐ Профессионал такси</option>
                                <option value="casual">🚗 Жөнөкөй Попутка</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кайдан</label>
                            <div class="relative group">
                                <i class="fa-solid fa-location-dot absolute left-3 top-3.5 text-blue-500 transition-transform duration-300 group-hover:scale-110"></i>
                                <input type="text" id="search-from" oninput="searchTrips()" placeholder="Мисалы: Кара-Көл" class="w-full border border-slate-200 pl-9 pr-4 py-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кайда</label>
                            <div class="relative group">
                                <i class="fa-solid fa-flag-checkered absolute left-3 top-3.5 text-indigo-500 transition-transform duration-300 group-hover:scale-110"></i>
                                <input type="text" id="search-to" oninput="searchTrips()" placeholder="Мисалы: Бишкек" class="w-full border border-slate-200 pl-9 pr-4 py-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 transform hover:shadow-md transition duration-300">
                    <h3 class="text-sm font-bold text-slate-900 mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-map-location-dot text-blue-500"></i> Активдүү багыттар картасы
                    </h3>
                    <div id="map" class="shadow-inner"></div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-slate-900">Жаңы сунушталган каттамдар</h2>
                    <span id="ads-count" class="text-xs bg-blue-100 text-blue-700 font-bold px-3 py-1 rounded-full transition-all duration-300">0 жарыя</span>
                </div>
                
                <div id="ads-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
            </div>
        </section>

        <section id="driver-section" class="hidden max-w-2xl mx-auto animate-fade-in">
            <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-100 transform hover:shadow-lg transition duration-300">
                <div class="flex items-center gap-3 border-b pb-4 mb-6">
                    <span class="text-3xl animate-bounce">🚖</span>
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900">Каттам тууралуу жарыялоо</h2>
                        <p id="driver-profile-notice" class="text-sm text-blue-600 font-medium"></p>
                    </div>
                </div>
                
                <form id="taxi-form" onsubmit="saveForm(event)" class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кайдан (Баштапкы дарек)</label>
                            <input type="text" id="trip-from" placeholder="Мисалы: Кара-Көл" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кайда (Aкыркы дарек)</label>
                            <input type="text" id="trip-to" placeholder="Мисалы: Бишкек" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition focus:border-blue-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Машинанын маркасы</label>
                            <input type="text" id="car-brand" placeholder="Toyota Camry" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Мамлекеттик номери</label>
                            <input type="text" id="car-number" placeholder="01KG777AAZ" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition focus:border-blue-500 uppercase">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Чыга турган күнү жана сааты</label>
                            <input type="datetime-local" id="trip-time" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Бош орун саны</label>
                            <input type="number" id="car-seats" min="1" max="20" placeholder="4" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition focus:border-blue-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Жол киреси (Бир орунга сом)</label>
                        <input type="number" id="trip-price" placeholder="1200" required class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition focus:border-blue-500">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Кошумча маалымат (Описание)</label>
                        <textarea id="trip-description" rows="3" placeholder="Кондиционер бар, жүк көп болсо чалыңыз..." class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition focus:border-blue-500 text-sm"></textarea>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-dashed border-slate-300">
                        <label class="block text-sm font-bold text-slate-700 mb-1">📸 Машинанын сүрөтү</label>
                        <div class="flex flex-wrap items-center gap-3">
                            <label class="bg-blue-50 text-blue-600 border border-blue-200 px-4 py-2 rounded-xl font-medium cursor-pointer text-sm hover:bg-blue-100 transition transform active:scale-95">
                                Файл тандаңыз <input type="file" id="car-photo-file" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'car')">
                            </label>
                            <button type="button" onclick="openCameraModal('car')" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm hover:bg-slate-900 transition transform active:scale-95"><i class="fa-solid fa-camera animate-pulse-soft"></i> Тартуу</button>
                            <div id="car-preview" class="hidden text-xs text-green-600 font-bold animate-fade-in">✓ Жүктөлдү</div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 text-white py-4 rounded-xl font-bold text-lg hover:from-green-700 hover:to-emerald-700 transition duration-300 transform hover:-translate-y-0.5 shadow-lg active:translate-y-0">Жарыялоо 🚀</button>
                </form>
            </div>
        </section>
    </main>

    <div id="reviews-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 overflow-y-auto animate-fade-in">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 space-y-4 shadow-2xl transform scale-95 opacity-0 modal-bounce" id="reviews-card-modal">
            <div class="flex justify-between items-center border-b pb-3">
                <div>
                    <h3 id="reviews-title-name" class="text-xl font-bold text-slate-900">Айдоочунун пикирлери</h3>
                    <p id="reviews-title-stats" class="text-xs text-slate-500 font-medium mt-0.5"></p>
                </div>
                <button onclick="closeReviewsModal()" class="text-slate-400 hover:text-slate-600 text-2xl transition">✕</button>
            </div>

            <div id="reviews-list-container" class="space-y-3 max-h-[45vh] overflow-y-auto pr-1">
                </div>

            <div class="border-t pt-4 space-y-3 bg-slate-50/50 -mx-6 -mb-6 p-6 rounded-b-2xl">
                <h4 class="text-sm font-bold text-slate-900">✍️ Пикир калтыруу</h4>
                
                <div class="flex items-center gap-2">
                    <span class="text-xs font-semibold text-slate-500 uppercase">Рейтинг:</span>
                    <div class="flex gap-1 text-xl text-amber-400" id="rating-stars-input">
                        <i class="fa-solid fa-star cursor-pointer transition transform hover:scale-125" onclick="setRatingValue(1)"></i>
                        <i class="fa-solid fa-star cursor-pointer transition transform hover:scale-125" onclick="setRatingValue(2)"></i>
                        <i class="fa-solid fa-star cursor-pointer transition transform hover:scale-125" onclick="setRatingValue(3)"></i>
                        <i class="fa-solid fa-star cursor-pointer transition transform hover:scale-125" onclick="setRatingValue(4)"></i>
                        <i class="fa-solid fa-star cursor-pointer transition transform hover:scale-125" onclick="setRatingValue(5)"></i>
                    </div>
                    <input type="hidden" id="new-rating-value" value="5">
                </div>

                <div class="flex gap-2">
                    <input type="text" id="new-review-text" placeholder="Жакшы айдайт экен, сунуштайм..." class="flex-1 border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition bg-white shadow-sm">
                    <button onclick="submitReview()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 rounded-xl font-bold text-sm shadow transition transform active:scale-95">Жөнөтүү</button>
                </div>
            </div>
        </div>
    </div>

    <div id="camera-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[110] flex items-center justify-center p-4 animate-fade-in">
        <div class="bg-white rounded-2xl max-w-md w-full p-5 space-y-4 transform scale-95 opacity-0 modal-bounce" id="camera-card-modal">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="font-bold text-slate-900">📸 Камера аркылуу тартуу</h3>
                <button onclick="closeCameraModal()" class="text-slate-400 hover:text-slate-600 text-xl transition">✕</button>
            </div>
            <video id="camera-video" autoplay playsinline class="w-full h-64 bg-black object-cover rounded-xl shadow-inner"></video>
            <div class="flex gap-3">
                <button onclick="closeCameraModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-xl transition">Жабуу</button>
                <button onclick="takeSnapshot()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl font-bold shadow transition transform active:scale-95">Тартуу 📸</button>
            </div>
            <canvas id="camera-canvas" class="hidden"></canvas>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 overflow-y-auto animate-fade-in">
        <div class="bg-white rounded-2xl max-w-md w-full overflow-hidden shadow-2xl my-8 transform scale-95 opacity-0 modal-bounce" id="auth-card-modal">
            <div class="flex border-b bg-slate-50">
                <button onclick="switchAuthTab('login')" id="btn-auth-login-tab" class="flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all duration-300">Кирүү</button>
                <button onclick="switchAuthTab('register')" id="btn-auth-reg-tab" class="flex-1 py-4 text-center font-bold text-sm text-slate-500 border-b-2 border-transparent transition-all duration-300">Катталуу</button>
            </div>

            <div id="auth-login-form" class="p-6 space-y-4 animate-fade-in">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Телефон номер</label>
                    <input type="tel" id="login-phone" placeholder="+996700112233" class="w-full border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Сыр сөз</label>
                    <input type="password" id="login-password" placeholder="******" class="w-full border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-sm shadow transition transform active:scale-95">Кирүү 🔑</button>
                <button onclick="closeAuthModal()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-xl text-sm transition">Жабуу</button>
            </div>

            <div id="auth-register-form" class="hidden p-6 space-y-4 max-h-[80vh] overflow-y-auto animate-fade-in">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Ролуңузду тандаңыз</label>
                    <select id="reg-role" onchange="toggleRoleFields()" class="w-full border border-slate-200 p-3 rounded-xl font-bold text-sm bg-slate-50 cursor-pointer">
                        <option value="passenger">👨‍✈️ Мен Жүргүнчүмүн (Кардар)</option>
                        <option value="casual_driver">🚗 Мен Жөнөкөй Айдоочумун (Попутка)</option>
                        <option value="professional_driver">⭐ Мен Профессионал Айдоочумун (Такси)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Толук атыңыз</label>
                    <input type="text" id="reg-name" placeholder="Аты-жөнүңүз" class="w-full border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Телефон номер</label>
                    <input type="tel" id="reg-phone" placeholder="+996700112233" class="w-full border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div id="div-reg-age" class="hidden">
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Жашыңыз</label>
                    <input type="number" id="reg-age" placeholder="Мисалы: 28" class="w-full border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Сыр сөз (Пароль)</label>
                    <input type="password" id="reg-password" placeholder="Пароль түзүңүз" class="w-full border border-slate-200 p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div id="div-reg-docs" class="hidden space-y-3 bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <p class="text-xs font-bold text-slate-700">📄 Документтерди тастыктоо:</p>
                    
                    <div class="space-y-1">
                        <label class="block text-[11px] font-medium text-slate-600">Айдоочулук күбөлүк (Права)</label>
                        <div class="flex items-center gap-2">
                            <label class="bg-white border px-3 py-1.5 rounded-lg text-xs cursor-pointer hover:bg-slate-100 transition">Файл... <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'license')"></label>
                            <button type="button" onclick="openCameraModal('license')" class="bg-slate-700 hover:bg-slate-800 text-white px-3 py-1.5 rounded-lg text-xs transition">Камера</button>
                            <span id="preview-license" class="text-xs text-red-500 font-medium">Жүктөлгөн жок</span>
                        </div>
                    </div>

                    <div id="div-reg-license-prof" class="space-y-1 hidden">
                        <label class="block text-[11px] font-medium text-slate-600">Такси ишмердүүлүк Лицензиясы</label>
                        <div class="flex items-center gap-2">
                            <label class="bg-white border px-3 py-1.5 rounded-lg text-xs cursor-pointer hover:bg-slate-100 transition">Файл... <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'patent')"></label>
                            <button type="button" onclick="openCameraModal('patent')" class="bg-slate-700 hover:bg-slate-800 text-white px-3 py-1.5 rounded-lg text-xs transition">Камера</button>
                            <span id="preview-patent" class="text-xs text-red-500 font-medium">Жүктөлгөн жок</span>
                        </div>
                    </div>
                </div>

                <button onclick="handleRegister()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold text-sm shadow transition transform active:scale-95">Катталууну аяктоо ✨</button>
                <button onclick="closeAuthModal()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-xl text-sm transition">Жабуу</button>
            </div>
        </div>
    </div>

    <script>
        // ДЕФОЛТТУК МААЛЫМАТТАР
        const defaultAds = [
            { id: 101, name: "Азамат", phone: "+996700112233", brand: "Toyota Camry", number: "01KG777AAZ", from: "Кара-Көл", to: "Бишкек", time: "2026-06-15T08:30", price: "1200", seats: "4", description: "Багаж бар, кондиционер иштейт, жолуңуз байсалдуу болсун.", type: "professional", driverAge: "34", hasLicense: true, photo: "" },
            { id: 102, name: "Бакыт", phone: "+996555443322", brand: "Honda Stepwgn", number: "04KG221ABC", from: "Бишкек", to: "Ош", time: "2026-06-16T20:00", price: "1500", seats: "6", description: "Түнкү рейс, арткы орундуктар бош, кенен жүк салынат.", type: "casual", driverAge: "29", hasLicense: true, photo: "" }
        ];

        const defaultReviews = [
            { driverPhone: "+996700112233", reviewerName: "Нурбек", rating: 5, text: "Абдан жакшы айдоочу экен, машина таза, тез жеткирди!", date: "2026-05-28" },
            { driverPhone: "+996700112233", reviewerName: "Айсулуу", rating: 4, text: "Баары жакты, болгону бир аз кечигип чыктык.", date: "2026-05-30" }
        ];

        // LOCALSTORAGE МЕНЕН ИШТӨӨ
        let ads = JSON.parse(localStorage.getItem('sapardash_ads')) || defaultAds;
        let users = JSON.parse(localStorage.getItem('sapardash_users')) || [];
        let currentUser = JSON.parse(localStorage.getItem('sapardash_current_user')) || null;
        let reviews = JSON.parse(localStorage.getItem('sapardash_reviews')) || defaultReviews;
        
        let map;
        let tempImages = { car: "", license: "", patent: "" };
        let activeCameraTarget = ""; 
        let videoStream = null;
        let activeDriverPhoneForReview = ""; 

        // КАРТА ИНИЦИАЛИЗАЦИЯСЫ
        function initMap() {
            map = L.map('map').setView([41.2044, 74.7661], 6); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        // БАШКЫ ТАБДАРДЫ АЛМАШТЫРУУ (ЖҮРГҮНЧҮ / АЙДООЧУ)
        function switchTab(tab) {
            const passengerSec = document.getElementById('passenger-section');
            const driverSec = document.getElementById('driver-section');
            const btnPass = document.getElementById('btn-passenger-tab');
            const btnDrive = document.getElementById('btn-driver-tab');

            if (tab === 'passenger') {
                passengerSec.classList.remove('hidden');
                driverSec.classList.add('hidden');
                btnPass.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-white text-blue-600 shadow transition-all duration-300";
                btnDrive.className = "px-4 py-2 rounded-lg text-sm font-semibold text-white hover:bg-white/10 transition-all duration-300";
            } else {
                if (!currentUser || currentUser.role === 'passenger') {
                    alert("Жарыя кошуу үчүн Айдоочу болуп катталышыңыз керек!");
                    openAuthModal('register');
                    return;
                }
                passengerSec.classList.add('hidden');
                driverSec.classList.remove('hidden');
                btnDrive.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-white text-blue-600 shadow transition-all duration-300";
                btnPass.className = "px-4 py-2 rounded-lg text-sm font-semibold text-white hover:bg-white/10 transition-all duration-300";
                document.getElementById('driver-profile-notice').textContent = `Профиль: ${currentUser.name} (${currentUser.role === 'professional_driver' ? 'Проф Такси' : 'Жөнөкөй айдоочу'}, Жашы: ${currentUser.age || '—'})`;
            }
        }

        // КИРҮҮ / КАТТАЛУУ ТАБДАРЫН АЛМАШТЫРУУ
        function switchAuthTab(mode) {
            const loginForm = document.getElementById('auth-login-form');
            const regForm = document.getElementById('auth-register-form');
            const loginTab = document.getElementById('btn-auth-login-tab');
            const regTab = document.getElementById('btn-auth-reg-tab');

            if (mode === 'login') {
                loginForm.classList.remove('hidden');
                regForm.classList.add('hidden');
                loginTab.className = "flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all duration-300";
                regTab.className = "flex-1 py-4 text-center font-bold text-sm text-slate-500 border-b-2 border-transparent transition-all duration-300";
            } else {
                loginForm.classList.add('hidden');
                regForm.classList.remove('hidden');
                regTab.className = "flex-1 py-4 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition-all duration-300";
                loginTab.className = "flex-1 py-4 text-center font-bold text-sm text-slate-500 border-b-2 border-transparent transition-all duration-300";
            }
        }

        // РОЛГО ЖАРАША ТАЛАПТАРДЫ КӨРСӨТҮҮ
        function toggleRoleFields() {
            const role = document.getElementById('reg-role').value;
            const divAge = document.getElementById('div-reg-age');
            const divDocs = document.getElementById('div-reg-docs');
            const divProfDoc = document.getElementById('div-reg-license-prof');

            if (role === 'passenger') {
                divAge.classList.add('hidden'); divDocs.classList.add('hidden');
            } else if (role === 'casual_driver') {
                divAge.classList.remove('hidden'); divDocs.classList.remove('hidden'); divProfDoc.classList.add('hidden');
            } else if (role === 'professional_driver') {
                divAge.classList.remove('hidden'); divDocs.classList.remove('hidden'); divProfDoc.classList.remove('hidden');
            }
        }

        // СҮРӨТ ЖҮКТӨӨ (FILE READER)
        function handleImageUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                tempImages[type] = e.target.result;
                updateImageStatusUI(type);
            };
            reader.readAsDataURL(file);
        }

        // КАМЕРА АЧУУ
        function openCameraModal(type) {
            activeCameraTarget = type;
            const modal = document.getElementById('camera-modal');
            const card = document.getElementById('camera-card-modal');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                card.style.transform = 'scale(1)';
                card.style.opacity = '1';
            }, 30);

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    videoStream = stream;
                    document.getElementById('camera-video').srcObject = stream;
                })
                .catch(() => {
                    alert("Камера ачылган жок же уруксат берилген эмес!");
                    closeCameraModal();
                });
        }

        function closeCameraModal() {
            const card = document.getElementById('camera-card-modal');
            card.style.transform = 'scale(0.95)';
            card.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('camera-modal').classList.add('hidden');
            }, 150);
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        function takeSnapshot() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('camera-canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            tempImages[activeCameraTarget] = canvas.toDataURL('image/jpeg');
            updateImageStatusUI(activeCameraTarget);
            closeCameraModal();
        }

        function updateImageStatusUI(type) {
            if (type === 'car') document.getElementById('car-preview').classList.remove('hidden');
            if (type === 'license') {
                document.getElementById('preview-license').textContent = "✓ Түзүлдү";
                document.getElementById('preview-license').className = "text-xs text-green-600 font-bold animate-fade-in";
            }
            if (type === 'patent') {
                document.getElementById('preview-patent').textContent = "✓ Түзүлдү";
                document.getElementById('preview-patent').className = "text-xs text-green-600 font-bold animate-fade-in";
            }
        }

        // КАТТАЛУУНУ ИШКЕ АШЫРУУ
        function handleRegister() {
            const role = document.getElementById('reg-role').value;
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const age = document.getElementById('reg-age').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!name || !phone || !password) { alert("Сураныч, негизги талааларды толтуруңуз!"); return; }
            if (role !== 'passenger' && !age) { alert("Сураныч, жашыңызды жазыңыз!"); return; }
            if (role !== 'passenger' && !tempImages['license']) { alert("Айдоочулук күбөлүктүн сүрөтүн тиркеңиз!"); return; }
            if (role === 'professional_driver' && !tempImages['patent']) { alert("Лицензия/Патент сүрөтүн тиркеңиз!"); return; }

            const newUser = { role, name, phone, age, password, licenseImg: tempImages['license'], patentImg: tempImages['patent'] };
            users.push(newUser);
            localStorage.setItem('sapardash_users', JSON.stringify(users));

            currentUser = newUser;
            localStorage.setItem('sapardash_current_user', JSON.stringify(currentUser));

            alert("Каттоо ийгиликтүү бүттү!");
            closeAuthModal();
            updateAuthUI();
        }

        // КИРҮҮНҮ ИШКЕ АШЫРУУ
        function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const password = document.getElementById('login-password').value.trim();
            
            const found = users.find(u => u.phone === phone && u.password === password);
            if (found) {
                currentUser = found;
                localStorage.setItem('sapardash_current_user', JSON.stringify(currentUser));
                alert("Кош келиңиз!");
                closeAuthModal();
                updateAuthUI();
            } else {
                alert("Логин же сыр сөз ката!");
            }
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('sapardash_current_user');
            updateAuthUI();
            switchTab('passenger');
        }

        function updateAuthUI() {
            const container = document.getElementById('auth-status');
            if (currentUser) {
                let rTxt = currentUser.role === 'passenger' ? 'Кардар' : (currentUser.role === 'professional_driver' ? 'Проф Айдоочу' : 'Попутка');
                container.innerHTML = `
                    <span class="font-bold text-blue-100">👋 ${currentUser.name} (${rTxt})</span>
                    <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-600 px-2.5 py-1 rounded-lg text-xs font-semibold ml-1 transition transform active:scale-95">Чыгуу</button>
                `;
            } else {
                container.innerHTML = `
                    <button onclick="openAuthModal('login')" class="bg-white/10 hover:bg-white text-white hover:text-blue-600 px-4 py-2 rounded-xl text-xs font-bold transition duration-300 border border-white/20 shadow-sm">Кирүү / Катталуу</button>
                `;
            }
        }

        function openAuthModal(mode) {
            const modal = document.getElementById('auth-modal');
            const card = document.getElementById('auth-card-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                card.style.transform = 'scale(1)';
                card.style.opacity = '1';
            }, 30);
            switchAuthTab(mode);
            toggleRoleFields();
        }

        function closeAuthModal() {
            const card = document.getElementById('auth-card-modal');
            card.style.transform = 'scale(0.95)';
            card.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-modal').classList.add('hidden');
            }, 150);
        }

        // ЖАҢЫ ЖАРЫЯ САКТОО
        function saveForm(event) {
            event.preventDefault();
            const type = currentUser.role === 'professional_driver' ? 'professional' : 'casual';
            
            const newAd = {
                id: Date.now(),
                name: currentUser.name,
                phone: currentUser.phone,
                driverAge: currentUser.age,
                hasLicense: !!currentUser.licenseImg,
                brand: document.getElementById('car-brand').value,
                number: document.getElementById('car-number').value.toUpperCase(),
                from: document.getElementById('trip-from').value,
                to: document.getElementById('trip-to').value,
                time: document.getElementById('trip-time').value,
                price: document.getElementById('trip-price').value,
                seats: document.getElementById('car-seats').value,
                description: document.getElementById('trip-description').value,
                type: type,
                photo: tempImages['car']
            };

            ads.unshift(newAd);
            localStorage.setItem('sapardash_ads', JSON.stringify(ads));

            // Форманы тазалоо
            document.getElementById('taxi-form').reset();
            tempImages['car'] = "";
            document.getElementById('car-preview').classList.add('hidden');

            alert("Жарыяңыз ийгиликтүү жайгаштырылды!");
            switchTab('passenger');
            renderAds();
        }

        // ИЗДӨӨ ЖАНА ФИЛЬТР
        function searchTrips() {
            const fromVal = document.getElementById('search-from').value.toLowerCase().trim();
            const toVal = document.getElementById('search-to').value.toLowerCase().trim();
            const typeVal = document.getElementById('filter-type').value;

            const filtered = ads.filter(ad => {
                const matchFrom = ad.from.toLowerCase().includes(fromVal);
                const matchTo = ad.to.toLowerCase().includes(toVal);
                const matchType = (typeVal === 'all' || ad.type === typeVal);
                return matchFrom && matchTo && matchType;
            });

            renderAds(filtered);
        }

        // ЖАРЫЯЛАРДЫ ЭКРАНГА ЧЫГАРУУ (АНИМАЦИЯ МЕНЕН ЖАКШЫРТЫЛДЫ)
        function renderAds(filteredAds = ads) {
            const container = document.getElementById('ads-container');
            container.innerHTML = '';
            document.getElementById('ads-count').textContent = `${filteredAds.length} жарыя`;

            if (filteredAds.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-12 text-slate-400 animate-fade-in">Учурда мындай багыт боюнча каттамдар табылган жок 😕</div>`;
                return;
            }

            filteredAds.forEach((ad, index) => {
                // Ар бир айдоочунун отзывдарын эсептөө
                const driverReviews = reviews.filter(r => r.driverPhone === ad.phone);
                const reviewCount = driverReviews.length;
                const avgRating = reviewCount > 0 ? (driverReviews.reduce((sum, r) => sum + r.rating, 0) / reviewCount).toFixed(1) : "0.0";

                const isProf = ad.type === 'professional';
                
                // Ар бир карточка кезек-кезеги менен чыгуусу үчүн кечигүү (delay)
                const delay = index * 80;

                container.innerHTML += `
                    <div class="bg-white border rounded-2xl overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300 animate-fade-in-up" style="animation-delay: ${delay}ms">
                        <div class="relative h-44 bg-slate-100 overflow-hidden group">
                            <img src="${ad.photo || 'https://images.unsplash.com/photo-1549399542-7e3f8b79c341?w=500'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                            <span class="absolute top-2 left-2 text-[10px] font-bold px-2 py-1 rounded-xl bg-white/95 backdrop-blur-sm border shadow-sm ${isProf ? 'text-amber-600' : 'text-blue-600'}">
                                ${isProf ? '⭐ Профессионал Такси' : '🚗 Жөнөкөй Попутка'}
                            </span>
                        </div>
                        <div class="p-5 space-y-3">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold text-slate-900 text-base">${ad.from} ➔ ${ad.to}</h3>
                                <span class="font-black text-blue-600 text-lg">${ad.price} сом</span>
                            </div>
                            
                            <div class="text-xs bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-1 hover:bg-blue-50/40 transition">
                                <p class="font-bold text-slate-700 flex justify-between items-center">
                                    <span>👤 ${ad.name} ${ad.driverAge ? `(${ad.driverAge} жашта)` : ''}</span>
                                    <button onclick="openReviewsModal('${ad.phone}', '${ad.name}')" class="text-blue-600 underline font-semibold hover:text-indigo-600 transition">
                                        ⭐ ${avgRating} (${reviewCount} отзыв)
                                    </button>
                                </p>
                                <p class="text-[11px] text-slate-500">
                                    📜 Документ: <span class="text-green-600 font-bold">✓ Тастыкталган</span> 
                                    ${isProf ? ' | <span class="text-amber-600 font-bold">⭐ Лицензия бар</span>' : ''}
                                </p>
                            </div>

                            ${ad.description ? `<p class="text-xs italic text-slate-600 bg-slate-50 p-2 rounded-lg border-l-2 border-blue-500">"${ad.description}"</p>` : ''}
                            
                            <div class="text-xs text-slate-500 flex justify-between pt-1">
                                <span>🪑 Бош орун: <span class="font-bold text-slate-800">${ad.seats}</span></span> 
                                <span>🚘 ${ad.brand} <span class="bg-slate-100 px-1.5 py-0.5 rounded font-mono border text-[10px]">${ad.number}</span></span>
                            </div>

                            <a href="tel:${ad.phone}" class="w-full text-center bg-blue-600 hover:bg-indigo-600 text-white block py-2.5 rounded-xl font-bold text-sm transition duration-300 transform active:scale-95 shadow hover:shadow-lg">
                                📞 Чалуу: ${ad.phone}
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        // ОТЗЫВ МОДАЛЫН АЧУУ
        function openReviewsModal(phone, name) {
            activeDriverPhoneForReview = phone;
            document.getElementById('reviews-title-name').textContent = `${name} — Айдоочунун профили`;
            
            const modal = document.getElementById('reviews-modal');
            const card = document.getElementById('reviews-card-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                card.style.transform = 'scale(1)';
                card.style.opacity = '1';
            }, 30);

            renderReviewsList();
        }

        function closeReviewsModal() {
            const card = document.getElementById('reviews-card-modal');
            card.style.transform = 'scale(0.95)';
            card.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('reviews-modal').classList.add('hidden');
            }, 150);
        }

        // ПИКИРЛЕР ТИЗМЕСИН ЧЫГАРУУ
        function renderReviewsList() {
            const container = document.getElementById('reviews-list-container');
            container.innerHTML = "";

            const filtered = reviews.filter(r => r.driverPhone === activeDriverPhoneForReview);
            document.getElementById('reviews-title-stats').textContent = `Жалпы пикирлердин саны: ${filtered.length}`;

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-center py-6 text-sm text-slate-400 animate-fade-in">Бул айдоочуга азырынча пикир калтырыла элек. Биринчи болуп жазыңыз!</p>`;
                return;
            }

            filtered.forEach((r, idx) => {
                let stars = "";
                for(let i=1; i<=5; i++) {
                    stars += `<i class="fa-solid fa-star ${i <= r.rating ? 'text-amber-400' : 'text-slate-200'}"></i>`;
                }

                container.innerHTML += `
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-xs space-y-1 animate-fade-in" style="animation-delay: ${idx * 50}ms">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-slate-800">${r.reviewerName}</span>
                            <span class="text-[10px] text-slate-400">${r.date}</span>
                        </div>
                        <div class="flex text-amber-400 text-[10px]">${stars}</div>
                        <p class="text-slate-600 mt-1">${r.text}</p>
                    </div>
                `;
            });
        }

        // РЕЙТИНГ ЖУЛДУЗДАРЫН ТАНДОО
        function setRatingValue(val) {
            document.getElementById('new-rating-value').value = val;
            const stars = document.querySelectorAll('#rating-stars-input i');
            stars.forEach((star, index) => {
                if (index < val) {
                    star.className = "fa-solid fa-star cursor-pointer text-amber-400 transition transform hover:scale-125";
                } else {
                    star.className = "fa-solid fa-star cursor-pointer text-slate-200 transition transform hover:scale-125";
                }
            });
        }

        // ЖАҢЫ ПИКИР КОШУУ
        function submitReview() {
            if (!currentUser) {
                alert("Отзыв калтыруу үчүн алгач катталыңыз же системага кириңиз!");
                openAuthModal('register');
                return;
            }

            const text = document.getElementById('new-review-text').value.trim();
            const rating = parseInt(document.getElementById('new-rating-value').value);

            if (!text) {
                alert("Сураныч, пикириңизди жазыңыз!");
                return;
            }

            const today = new Date().toISOString().split('T')[0];

            const newRev = {
                driverPhone: activeDriverPhoneForReview,
                reviewerName: currentUser.name,
                rating: rating,
                text: text,
                date: today
            };

            reviews.push(newRev);
            localStorage.setItem('sapardash_reviews', JSON.stringify(reviews));

            document.getElementById('new-review-text').value = "";
            setRatingValue(5);

            alert("Пикириңиз ийгиликтүү кабыл алынды!");
            renderReviewsList();
            renderAds(); 
        }

        window.onload = function() {
            initMap();
            updateAuthUI();
            renderAds();
        };
    </script>
</body>
</html>
